<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tic Tac Toe - Multiplayer</title>
    <link href="https://api.fontsource.org/v1/fonts/inter/latin.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(88, 28, 135, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(6, 182, 212, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(236, 72, 153, 0.2) 0%, transparent 50%);
            z-index: 0;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: var(--opacity); transform: scale(1); }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 16px;
            width: 100%;
            max-width: 420px;
        }

        .header {
            text-align: center;
            width: 100%;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a855f7, #ec4899, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            margin-top: 2px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .user-badge:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a855f7, #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.75rem;
            color: white;
        }

        .user-email {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .scoreboard {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .score-card {
            flex: 1;
            padding: 12px 8px;
            border-radius: 14px;
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .score-card.active-x {
            border-color: rgba(168, 85, 247, 0.4);
            background: rgba(168, 85, 247, 0.06);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.1);
        }

        .score-card.active-o {
            border-color: rgba(6, 182, 212, 0.4);
            background: rgba(6, 182, 212, 0.06);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.1);
        }

        .score-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }

        .score-x .score-label { color: #a855f7; }
        .score-draw .score-label { color: rgba(255, 255, 255, 0.4); }
        .score-o .score-label { color: #06b6d4; }

        .score-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: white;
        }

        .turn-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.3s ease;
            min-height: 36px;
        }

        .turn-symbol {
            font-weight: 800;
            font-size: 0.9rem;
        }

        .turn-symbol.x-turn { color: #a855f7; }
        .turn-symbol.o-turn { color: #06b6d4; }

        .game-mode-selector {
            display: flex;
            gap: 8px;
            width: 100%;
            margin-bottom: 8px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.3), rgba(6, 182, 212, 0.3));
            color: white;
            border-color: rgba(168, 85, 247, 0.5);
        }

        .room-info {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            margin-bottom: 8px;
            display: none;
        }

        .room-info.show {
            display: block;
        }

        .room-code {
            font-size: 1.2rem;
            font-weight: 800;
            color: #a855f7;
            letter-spacing: 0.1em;
            text-align: center;
            margin: 8px 0;
        }

        .room-status {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
        }

        .waiting-player {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #06b6d4;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 300px;
            aspect-ratio: 1;
            padding: 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            aspect-ratio: 1;
            min-height: 80px;
        }

        .cell:active {
            transform: scale(0.92);
        }

        .cell:not(.taken):hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .cell.taken {
            cursor: default;
        }

        .cell.win-cell {
            animation: winPulse 0.5s ease;
        }

        @keyframes winPulse {
            0%, 100% { background: rgba(255, 255, 255, 0.04); }
            50% { background: rgba(255, 255, 255, 0.15); }
        }

        .symbol {
            font-size: 2.8rem;
            font-weight: 900;
            opacity: 0;
            transform: scale(0) rotate(-20deg);
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .symbol.x { color: #a855f7; text-shadow: 0 0 20px rgba(168, 85, 247, 0.5); }
        .symbol.o { color: #06b6d4; text-shadow: 0 0 20px rgba(6, 182, 212, 0.5); }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .btn-group {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-restart {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: white;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .btn-restart:hover {
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4);
            transform: translateY(-1px);
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-invite {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            color: white;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }

        .btn-invite:hover {
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
            transform: translateY(-1px);
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(10px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            width: 90%;
            max-width: 360px;
            padding: 24px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .modal.show .modal-card {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: white;
            margin-bottom: 4px;
        }

        .modal-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .input-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-field {
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            outline: none;
            width: 100%;
        }

        .input-field:focus {
            border-color: rgba(168, 85, 247, 0.5);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .copy-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(168, 85, 247, 0.5);
            border-radius: 12px;
            background: rgba(168, 85, 247, 0.2);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 12px 0;
        }

        .copy-btn:hover {
            background: rgba(168, 85, 247, 0.3);
        }

        .copy-btn.copied {
            background: rgba(16, 185, 129, 0.3);
            border-color: rgba(16, 185, 129, 0.5);
        }

        .winner-modal .winner-content {
            text-align: center;
            transform: scale(0.8) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .winner-modal.show .winner-content {
            transform: scale(1) translateY(0);
        }

        .winner-emoji {
            font-size: 3.5rem;
            margin-bottom: 12px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .winner-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            margin-bottom: 6px;
        }

        .winner-sub {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 89;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall var(--fall-duration) linear forwards;
            opacity: 0;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(var(--rotation)); opacity: 0; }
        }

        .profile-dropdown {
            position: absolute;
            top: 60px;
            right: 10px;
            width: 220px;
            padding: 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
            transition: all 0.2s ease;
        }

        .profile-dropdown.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .profile-info {
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 12px;
        }

        .profile-name {
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .profile-email {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            word-break: break-all;
        }

        .profile-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            -webkit-tap-highlight-color: transparent;
        }

        .profile-btn-logout {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .profile-btn-logout:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .profile-btn-close {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .opponent-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.3);
            font-size: 0.75rem;
            color: #06b6d4;
            margin-bottom: 8px;
        }

        .online-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @media (max-height: 700px) {
            .container { gap: 12px; padding: 12px; }
            .title { font-size: 1.6rem; }
            .score-card { padding: 8px 6px; }
            .score-value { font-size: 1.4rem; }
            .board { max-width: 260px; gap: 6px; padding: 8px; border-radius: 16px; }
            .cell { border-radius: 10px; min-height: 70px; }
            .symbol { font-size: 2.2rem; }
            .btn { padding: 10px 14px; }
        }

        @media (min-width: 500px) {
            .board { max-width: 340px; }
            .symbol { font-size: 3.2rem; }
        }
  
        /* UPDATED ROOM INFO STYLES */
        .room-info { width: 100%; padding: 16px; border-radius: 16px; background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.3); margin-bottom: 8px; display: none; }
        .room-info.show { display: block; }
        .room-error { color: #ef4444; font-size: 0.8rem; text-align: center; margin-bottom: 12px; display: none; }
        .room-error.show { display: block; }
        .room-actions { display: flex; flex-direction: column; gap: 12px; }
        .btn-create-room { width: 100%; padding: 12px; border: 1px solid rgba(168, 85, 247, 0.5); border-radius: 10px; background: linear-gradient(135deg, #a855f7, #7c3aed); color: white; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        .btn-create-room:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(168, 85, 247, 0.4); }
        .btn-create-room:active { transform: scale(0.98); }
        .divider { display: flex; align-items: center; gap: 12px; color: rgba(255, 255, 255, 0.4); font-size: 0.75rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255, 255, 255, 0.1); }
        .join-section { display: flex; gap: 8px; }
        .join-input { flex: 1; padding: 10px 14px; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; background: rgba(255, 255, 255, 0.06); color: white; font-family: 'Inter', sans-serif; font-size: 0.9rem; text-align: center; text-transform: uppercase; letter-spacing: 0.1em; outline: none; transition: all 0.2s ease; }
        .join-input:focus { border-color: rgba(6, 182, 212, 0.5); background: rgba(255, 255, 255, 0.08); }
        .join-input::placeholder { color: rgba(255, 255, 255, 0.3); letter-spacing: 0.05em; text-transform: uppercase; }
        .btn-join-room { padding: 10px 16px; border: none; border-radius: 10px; background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; white-space: nowrap; }
        .btn-join-room:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(6, 182, 212, 0.4); }
        
        /* Room Active State */
        .room-active-view { display: none; text-align: center; }
        .room-active-view.show { display: block; }
        .room-code-display { background: rgba(168, 85, 247, 0.2); border: 2px solid rgba(168, 85, 247, 0.4); border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        .room-code { font-size: 1.5rem; font-weight: 800; color: #a855f7; letter-spacing: 0.15em; }
        .btn-copy { width: 100%; padding: 10px; border: 1px solid rgba(168, 85, 247, 0.5); border-radius: 10px; background: rgba(168, 85, 247, 0.2); color: white; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; margin-bottom: 8px; }
        .btn-copy:hover { background: rgba(168, 85, 247, 0.3); }
        .btn-copy.copied { background: rgba(16, 185, 129, 0.3); border-color: rgba(16, 185, 129, 0.5); }
        .room-status { font-size: 0.8rem; color: rgba(255, 255, 255, 0.6); }
        .waiting-player { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.7); }
        .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #06b6d4; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } }

        .confetti { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: confettiFall var(--fall-duration) linear forwards; opacity: 0; }
        @keyframes confettiFall { 0% { transform: translateY(-10px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(var(--rotation)); opacity: 0; } }
        .profile-dropdown { position: absolute; top: 60px; right: 10px; width: 220px; padding: 16px; border-radius: 16px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); z-index: 50; opacity: 0; pointer-events: none; transform: translateY(-10px); transition: all 0.2s ease; }

        @media (max-height: 700px) { .container { gap: 12px; padding: 12px; } .title { font-size: 1.6rem; } .score-card { padding: 8px 6px; } .score-value { font-size: 1.4rem; } .board { max-width: 260px; gap: 6px; padding: 8px; border-radius: 16px; } .cell { border-radius: 10px; min-height: 70px; } .symbol { font-size: 2.2rem; } .btn { padding: 10px 14px; } }
        @media (min-width: 500px) { .board { max-width: 340px; } .symbol { font-size: 3.2rem; } }

</head>
<body>
    <div class="bg-gradient"></div>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <div class="header">
            <div class="header-top">
                <div>
                    <h1 class="title">Tic Tac Toe</h1>

            <!-- Initial Selection View -->

        <div class="scoreboard">

            <div class="score-card score-draw">

            </div>
            <div class="score-card score-o" id="scoreCardO">
                <div class="score-label">Player O</div>
                <div class="score-value" id="scoreO">0</div>
            </div>
        </div>

        <div class="turn-indicator" id="turnIndicator">
            <span class="turn-symbol x-turn" id="turnSymbol">X</span>
            <span>turn</span>
        </div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="btn-group">

    <!-- Winner Modal -->
    <div class="modal winner-modal" id="winnerModal">
        <div class="winner-content">
            <div class="winner-emoji" id="winnerEmoji"></div>
            <div class="winner-text" id="winnerText">Player X Wins!</div>
            <div class="winner-sub" id="winnerSub">Click New Game to play again</div>
            <button class="btn btn-restart" id="btnPlayAgain">Play Again</button>

    <div class="confetti-container" id="confettiContainer"></div>

    <div class="profile-dropdown" id="profileDropdown">

        <button class="profile-btn profile-btn-logout" id="btnLogout">🚪 Sign Out</button>
        <button class="profile-btn profile-btn-close" id="btnCloseProfile">Close</button>
    </div>

    <script>
        (function() {
            // ==========================================
            // CONFIGURATION
            // ==========================================
            const SUPABASE_URL = 'https://edlhfxdmeckfzttanzju.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkbGhmeGRtZWNrZnp0dGFuemp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NDg1NjYsImV4cCI6MjA5MzMyNDU2Nn0.21_hH4uRqDuYaXZNqai_rfRnBn2DNLJokX2fZ_0m8rY';
            
            let supabase;
            let useSupabase = false;
            let realtimeChannel = null;
            let currentRoom = null;
            let mySymbol = null;
            let opponentId = null;
            let isMyTurn = false;
            
            // Initialize Supabase
            try {
                if (window.supabase && SUPABASE_URL !== 'https://YOUR_PROJECT_ID.supabase.co') {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    useSupabase = true;
                }
            } catch (e) {
                console.log('Supabase not configured');
            }

            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioContext();

            function playSound(type) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                if (type === 'X') {
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(783.99, audioCtx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.15);
                } else if (type === 'O') {
                    oscillator.frequency.setValueAtTime(349.23, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(261.63, audioCtx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.15);
                } else if (type === 'win') {
                    const notes = [523.25, 659.25, 783.99, 1046.50];
                    notes.forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.2);
                        osc.start(audioCtx.currentTime + i * 0.1);
                        osc.stop(audioCtx.currentTime + i * 0.1 + 0.2);
                    });
                } else if (type === 'draw') {
                    oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                    oscillator.frequency.linearRampToValueAtTime(200, audioCtx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                }
            }

            // DOM Elements
            const cells = document.querySelectorAll('.cell');
            const userBadge = document.getElementById('userBadge');
            const userAvatar = document.getElementById('userAvatar');
            const userEmail = document.getElementById('userEmail');
            const scoreCardX = document.getElementById('scoreCardX');
            const scoreCardO = document.getElementById('scoreCardO');
            const scoreXEl = document.getElementById('scoreX');
            const scoreOEl = document.getElementById('scoreO');
            const scoreDrawEl = document.getElementById('scoreDraw');
            const btnRestart = document.getElementById('btnRestart');
            const btnReset = document.getElementById('btnReset');
            const modeLocal = document.getElementById('modeLocal');
            const modeOnline = document.getElementById('modeOnline');
            const roomInfo = document.getElementById('roomInfo');
            const roomError = document.getElementById('roomError');
            const roomActions = document.getElementById('roomActions');
            const roomActiveView = document.getElementById('roomActiveView');
            const btnCreateRoom = document.getElementById('btnCreateRoom');
            const joinRoomInput = document.getElementById('joinRoomInput');
            const btnJoinRoom = document.getElementById('btnJoinRoom');
            const roomCodeEl = document.getElementById('roomCode');
            const copyRoomCode = document.getElementById('copyRoomCode');
            const waitingPlayer = document.getElementById('waitingPlayer');
            const opponentIndicator = document.getElementById('opponentIndicator');
            const btnLeaveRoom = document.getElementById('btnLeaveRoom');
            const winnerModal = document.getElementById('winnerModal');
            const winnerEmoji = document.getElementById('winnerEmoji');
            const winnerText = document.getElementById('winnerText');
            const winnerSub = document.getElementById('winnerSub');
            const btnPlayAgain = document.getElementById('btnPlayAgain');
            const confettiContainer = document.getElementById('confettiContainer');
            const profileDropdown = document.getElementById('profileDropdown');
            const profileName = document.getElementById('profileName');
            const profileEmail = document.getElementById('profileEmail');
            const btnLogout = document.getElementById('btnLogout');
            const btnCloseProfile = document.getElementById('btnCloseProfile');
            const boardEl = document.getElementById('board');
            const turnIndicator = document.getElementById('turnIndicator');
            const turnSymbol = document.getElementById('turnSymbol');

            let board = Array(9).fill(null);
            let currentPlayer = 'X';
            let gameActive = true;
            let scores = { X: 0, O: 0, draw: 0 };
            let currentUser = null;
            let gameMode = 'local';

            const winPatterns = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];

            function createStars() {
                const starsContainer = document.getElementById('stars');
                for (let i = 0; i < 60; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
                    star.style.setProperty('--opacity', (0.2 + Math.random() * 0.6));
                    star.style.animationDelay = Math.random() * 4 + 's';
                    starsContainer.appendChild(star);
                }
            }

            function createConfetti() {
                const colors = ['#a855f7', '#06b6d4', '#ec4899', '#f59e0b', '#10b981', '#ef4444', '#8b5cf6'];
                for (let i = 0; i < 50; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.setProperty('--fall-duration', (2 + Math.random() * 2) + 's');
                    confetti.style.setProperty('--rotation', (360 + Math.random() * 720) + 'deg');
                    confetti.style.animationDelay = Math.random() * 0.8 + 's';
                    confetti.style.width = (6 + Math.random() * 8) + 'px';
                    confetti.style.height = (6 + Math.random() * 8) + 'px';
                    confettiContainer.appendChild(confetti);
                }
            }

            function clearConfetti() {
                confettiContainer.innerHTML = '';
            }

            // Mode Selection
            modeLocal.addEventListener('click', () => {
                gameMode = 'local';
                modeLocal.classList.add('active');
                modeOnline.classList.remove('active');
                roomInfo.classList.remove('show');
                leaveRoom();
                resetGame();
            });

            modeOnline.addEventListener('click', () => {
                if (!useSupabase) {
                    roomError.classList.add('show');
                    return;
                }
                roomError.classList.remove('show');
                gameMode = 'online';
                modeOnline.classList.add('active');
                modeLocal.classList.remove('active');
                roomInfo.classList.add('show');
                showRoomSelection();
            });

            function showRoomSelection() {
                roomActions.style.display = 'flex';
                roomActiveView.classList.remove('show');
                joinRoomInput.value = '';
            }

            function showActiveRoom() {
                roomActions.style.display = 'none';
                roomActiveView.classList.add('show');
            }

            function generateRoomCode() {
                return Math.random().toString(36).substring(2, 8).toUpperCase();
            }

            async function createRoom() {
                if (!useSupabase) return;
                
                currentRoom = generateRoomCode();
                mySymbol = 'X';
                
                roomCodeEl.textContent = currentRoom;
                showActiveRoom();
                waitingPlayer.style.display = 'flex';
                opponentIndicator.style.display = 'none';
                joinRoomInput.disabled = true;
                btnJoinRoom.disabled = true;
                
                realtimeChannel = supabase.channel(`room:${currentRoom}`)
                    .on('broadcast', { event: 'move' }, payload => {
                        handleOpponentMove(payload.payload);
                    })
                    .on('broadcast', { event: 'join' }, payload => {
                        opponentId = payload.payload.playerId;
                        waitingPlayer.style.display = 'none';
                        opponentIndicator.style.display = 'flex';
                        joinRoomInput.disabled = false;
                        btnJoinRoom.disabled = false;
                    })
                    .on('broadcast', { event: 'leave' }, payload => {
                        opponentId = null;
                        opponentIndicator.style.display = 'none';
                        waitingPlayer.style.display = 'flex';
                    })
                    .subscribe();
                
                await supabase.channel(`room:${currentRoom}`).send({
                    type: 'broadcast',
                    event: 'creator-joined',
                    payload: { playerId: currentUser?.id || 'local-player' }
                });
            }

            async function joinRoom(roomCode) {
                if (!useSupabase) return;
                
                const code = roomCode.toUpperCase().trim();
                if (code.length !== 6) {
                    alert('Please enter a valid 6-character room code');
                    return;
                }
                
                currentRoom = code;
                mySymbol = 'O';
                
                roomCodeEl.textContent = currentRoom;
                showActiveRoom();
                waitingPlayer.style.display = 'none';
                opponentIndicator.style.display = 'flex';
                joinRoomInput.value = '';
                
                realtimeChannel = supabase.channel(`room:${currentRoom}`)
                    .on('broadcast', { event: 'move' }, payload => {
                        handleOpponentMove(payload.payload);
                    })
                    .on('broadcast', { event: 'creator-joined' }, payload => {
                        opponentId = payload.payload.playerId;
                        opponentIndicator.style.display = 'flex';
                    })
                    .subscribe(async (status) => {
                        if (status === 'SUBSCRIBED') {
                            await supabase.channel(`room:${currentRoom}`).send({
                                type: 'broadcast',
                                event: 'join',
                                payload: { playerId: currentUser?.id || 'local-player-2' }
                            });
                        }
                    });
            }

            function leaveRoom() {
                if (realtimeChannel) {
                    supabase.removeChannel(realtimeChannel);
                    realtimeChannel = null;
                }
                currentRoom = null;
                mySymbol = null;
                opponentId = null;
                isMyTurn = false;
                joinRoomInput.disabled = false;
                btnJoinRoom.disabled = false;
                showRoomSelection();
            }

            async function sendMove(index) {
                if (!realtimeChannel || !currentRoom) return;
                await supabase.channel(`room:${currentRoom}`).send({
                    type: 'broadcast',
                    event: 'move',
                    payload: { index, symbol: mySymbol }
                });
            }

            function handleOpponentMove(payload) {
                const { index, symbol } = payload;
                if (board[index]) return;
                
                board[index] = symbol;
                const cell = cells[index];
                cell.classList.add('taken');
                
                const symbolEl = document.createElement('span');
                symbolEl.className = 'symbol ' + (symbol === 'X' ? 'x' : 'o');
                symbolEl.textContent = symbol;
                cell.appendChild(symbolEl);
                
                playSound(symbol);
                
                const result = checkWinner();
                if (result) {
                    showWinner(result.winner, result.pattern);
                    return;
                }
                
                if (checkDraw()) {
                    showDraw();
                    return;
                }
                
                isMyTurn = true;
                updateTurnIndicator();
            }

            function updateTurnIndicator() {
                if (gameMode === 'online' && mySymbol) {
                    const displayTurn = isMyTurn ? mySymbol : (mySymbol === 'X' ? 'O' : 'X');
                    turnSymbol.textContent = displayTurn;
                    turnSymbol.className = 'turn-symbol ' + (displayTurn === 'X' ? 'x-turn' : 'o-turn');
                    
                    if (isMyTurn) {
                        turnIndicator.style.opacity = '1';
                        boardEl.style.pointerEvents = 'auto';
                    } else {
                        turnIndicator.style.opacity = '0.6';
                        boardEl.style.pointerEvents = 'none';
                    }
                } else {
                    turnSymbol.textContent = currentPlayer;
                    turnSymbol.className = 'turn-symbol ' + (currentPlayer === 'X' ? 'x-turn' : 'o-turn');
                    boardEl.style.pointerEvents = 'auto';
                }
                
                scoreCardX.className = 'score-card score-x' + ((gameMode === 'local' && currentPlayer === 'X') || (gameMode === 'online' && mySymbol === 'X' && isMyTurn) ? ' active-x' : '');
                scoreCardO.className = 'score-card score-o' + ((gameMode === 'local' && currentPlayer === 'O') || (gameMode === 'online' && mySymbol === 'O' && isMyTurn) ? ' active-o' : '');
            }

            function updateScoresDisplay() {
                scoreXEl.textContent = scores.X;
                scoreOEl.textContent = scores.O;
                scoreDrawEl.textContent = scores.draw;
            }

            function checkWinner() {
                for (const pattern of winPatterns) {
                    const [a, b, c] = pattern;
                    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                        return { winner: board[a], pattern };
                    }
                }
                return null;
            }

            function checkDraw() {
                return board.every(cell => cell !== null);
            }

            function showWinner(winner, pattern) {
                gameActive = false;
                pattern.forEach((idx, i) => {
                    setTimeout(() => {
                        cells[idx].classList.add('win-cell');
                    }, i * 80);
                });

                scores[winner]++;
                updateScoresDisplay();
                playSound('win');

                setTimeout(() => {
                    winnerEmoji.textContent = winner === 'X' ? '🟣' : '🔵';
                    winnerText.textContent = 'Player ' + winner + ' Wins!';
                    winnerSub.textContent = 'Click Play Again for another round';
                    winnerText.style.color = winner === 'X' ? '#a855f7' : '#06b6d4';
                    winnerModal.classList.add('show');
                    createConfetti();
                }, 400);
            }

            function showDraw() {
                gameActive = false;
                scores.draw++;
                updateScoresDisplay();
                playSound('draw');

                setTimeout(() => {
                    winnerEmoji.textContent = '🤝';
                    winnerText.textContent = "It's a Draw!";
                    winnerSub.textContent = 'No one wins this round';
                    winnerText.style.color = 'white';
                    winnerModal.classList.add('show');
                }, 300);
            }

            function handleCellClick(index) {
                if (board[index] || !gameActive) return;

                if (gameMode === 'online') {
                    if (!isMyTurn) return;
                    
                    board[index] = mySymbol;
                    const cell = cells[index];
                    cell.classList.add('taken');

                    const symbolEl = document.createElement('span');
                    symbolEl.className = 'symbol ' + (mySymbol === 'X' ? 'x' : 'o');
                    symbolEl.textContent = mySymbol;
                    cell.appendChild(symbolEl);
                    
                    playSound(mySymbol);
                    sendMove(index);

                    const result = checkWinner();
                    if (result) {
                        showWinner(result.winner, result.pattern);
                        return;
                    }

                    if (checkDraw()) {
                        showDraw();
                        return;
                    }

                    isMyTurn = false;
                    updateTurnIndicator();
                } else {
                    board[index] = currentPlayer;
                    const cell = cells[index];
                    cell.classList.add('taken');

                    const symbolEl = document.createElement('span');
                    symbolEl.className = 'symbol ' + (currentPlayer === 'X' ? 'x' : 'o');
                    symbolEl.textContent = currentPlayer;
                    cell.appendChild(symbolEl);
                    
                    playSound(currentPlayer);

                    const result = checkWinner();
                    if (result) {
                        showWinner(result.winner, result.pattern);
                        return;
                    }

                    if (checkDraw()) {
                        showDraw();
                        return;
                    }

                    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                    updateTurnIndicator();
                }
            }

            function resetGame() {
                board = Array(9).fill(null);
                currentPlayer = 'X';
                gameActive = true;
                isMyTurn = mySymbol === 'X';

                cells.forEach(cell => {
                    cell.innerHTML = '';
                    cell.className = 'cell';
                });

                updateTurnIndicator();
                winnerModal.classList.remove('show');
                clearConfetti();
            }

            function resetScores() {
                scores = { X: 0, O: 0, draw: 0 };
                updateScoresDisplay();
                resetGame();
            }

            // Event Listeners
            cells.forEach((cell, index) => {
                cell.addEventListener('click', () => handleCellClick(index));
            });

            btnRestart.addEventListener('click', resetGame);
            btnPlayAgain.addEventListener('click', resetGame);
            btnReset.addEventListener('click', () => {
                resetScores();
                leaveRoom();
            });
            
            btnCreateRoom.addEventListener('click', createRoom);
            
            btnJoinRoom.addEventListener('click', () => {
                const code = joinRoomInput.value.trim();
                if (code) joinRoom(code);
            });

            joinRoomInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const code = joinRoomInput.value.trim();
                    if (code) joinRoom(code);
                }
            });

            btnLeaveRoom.addEventListener('click', () => {
                leaveRoom();
                resetGame();
            });

            copyRoomCode.addEventListener('click', () => {
                if (currentRoom) {
                    navigator.clipboard.writeText(currentRoom);
                    copyRoomCode.textContent = '✓ Copied!';
                    copyRoomCode.classList.add('copied');
                    setTimeout(() => {
                        copyRoomCode.textContent = ' Copy Code';
                        copyRoomCode.classList.remove('copied');
                    }, 2000);
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    winnerModal.classList.remove('show');
                    profileDropdown.classList.remove('show');
                }
            });

            createStars();
            updateScoresDisplay();
            updateTurnIndicator();
        })();
    </script>
</body>
</html>
